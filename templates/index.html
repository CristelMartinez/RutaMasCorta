<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/styles.css">
    <title>OptimizarRuta.com</title>
    
    <script>
        let map, directionsService, directionsRenderer;

        function initMap() {
            map = new google.maps.Map(document.getElementById('map'), {
                zoom: 5,
                center: { lat: 23.6345, lng: -102.5528 }
            });

            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer();
            directionsRenderer.setMap(map);
        }

        function trazarRuta(coordenadasRuta, distancia) {

            const origen = coordenadasRuta[0];
            const destino = coordenadasRuta[1];

            const request = {
                origin: { lat: origen[0], lng: origen[1] },
                destination: { lat: destino[0], lng: destino[1] },
                travelMode: google.maps.TravelMode.DRIVING
                //avoidFerries: true
            };

            directionsService.route(request, (result, status) => {

                if (status === google.maps.DirectionsStatus.OK) {

                    directionsRenderer.setDirections(result);

                    let totalDistance = 0;

                        result.routes[0].legs.forEach(leg => {
                        totalDistance += leg.distance.value;
                    });

                    const distanceInKm = (totalDistance / 1000).toFixed(2);

                        mostrarInfoRuta(distanceInKm);

                } else {
                    alert('Error al obtener la ruta: ' + status);
                }
            });
        }


        function mostrarInfoRuta(distancia) {

            const existingInfoDiv = document.querySelector('.info');

            if (existingInfoDiv) {
                existingInfoDiv.remove();
            }

            const infoDiv = document.createElement('div');

            infoDiv.classList.add('info');

            const infoText = `
                <p>
                    Distancia total:
                    <span>${distancia}</span> km
                </p>
            `;

            infoDiv.innerHTML = infoText;

            document
                .getElementById('map')
                .insertAdjacentElement('afterend', infoDiv);
        }

        function obtenerRuta() {
            const ciudad_inicio = document.getElementById('ciudad_inicio').value;
            const ciudad_final = document.getElementById('ciudad_final').value;

            fetch('/get_routes', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ start: ciudad_inicio, end: ciudad_final })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    alert(data.error);
                } else {
                    trazarRuta(data.coordenadas_ruta, data.distancia_km);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Hubo un error al obtener la ruta.');
            });
        }
    </script>
</head>
<body>
    <div class="container">
        <h1 id="section1">Calcular la ruta más corta</h1>
        <div class="selector">
            <div>
                <label for="ciudad_inicio">Ciudad de inicio:</label>
                <select id="ciudad_inicio">
                    {% for ciudad in ciudades %}
                        <option value="{{ ciudad }}">{{ ciudad }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="ciudad_final">Ciudad de fin:</label>
                <select id="ciudad_final">
                    {% for ciudad in ciudades %}
                        <option value="{{ ciudad }}">{{ ciudad }}</option>
                    {% endfor %}
                </select>
            </div>
            <button onclick="obtenerRuta()">Obtener ruta</button>
        </div>
        <div id="map"></div>
        <div class="info"></div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>© Cristel Martinez 2024</p>
    </div>

   <!-- Carga la API de Google Maps con tu clave API -->
   <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&callback=initMap" async defer></script>
</body>
</html>
